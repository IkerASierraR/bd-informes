# =============================================================================
# SafeBridge CI/CD Pipeline
# BitCraft Solutions — Universidad Privada de Tacna, FAING-EPIS
# =============================================================================
#
# Pipeline de Integración y Entrega Continua para SafeBridge.
# Etapas:
#   1. lint      — Análisis estático de código (flake8, pylint)
#   2. test      — Pruebas unitarias con pytest y cobertura
#   3. security  — Escaneo de vulnerabilidades (Semgrep + Snyk)
#   4. build     — Construcción del ejecutable (PyInstaller) e imagen Docker
#   5. release   — Publicación en GitHub Releases y Docker Hub
#
# Disparadores:
#   - Push a `main` o `develop`
#   - Pull Requests hacia `main` o `develop`
#   - Tags con formato `v*.*.*` (para releases)
# =============================================================================

name: SafeBridge CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: '3.12'
  APP_NAME: SafeBridge
  DOCKER_IMAGE: bitcraftsolutions/safebridge

# =============================================================================
# JOB 1: LINT — Análisis Estático de Código
# =============================================================================
jobs:
  lint:
    name: '🔍 Lint & Code Quality'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias de análisis
        run: |
          pip install --upgrade pip
          pip install flake8 pylint flake8-bugbear flake8-comprehensions

      - name: Instalar dependencias del proyecto
        run: |
          pip install -r SafeBridge/requirements.txt

      - name: Ejecutar flake8 (PEP8 + reglas adicionales)
        run: |
          flake8 SafeBridge/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=SafeBridge/__pycache__,SafeBridge/.venv \
            --format='%(path)s:%(row)d:%(col)d: %(code)s %(text)s'

      - name: Ejecutar pylint (calidad y convenciones)
        run: |
          pylint SafeBridge/ \
            --rcfile=.pylintrc \
            --fail-under=7.0 \
            --ignore=__pycache__ \
            || true  # No bloquea el pipeline, solo reporta

  # =============================================================================
  # JOB 2: TEST — Pruebas Unitarias con Cobertura
  # =============================================================================
  test:
    name: '🧪 Unit Tests & Coverage'
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']
      fail-fast: false

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Instalar dependencias del proyecto y pruebas
        run: |
          pip install --upgrade pip
          pip install -r SafeBridge/requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Ejecutar pruebas unitarias con cobertura
        run: |
          pytest SafeBridge/tests/ \
            --cov=SafeBridge \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/SafeBridge

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.os }}
          path: coverage.xml
          retention-days: 7

  # =============================================================================
  # JOB 3: SECURITY — Escaneo de Vulnerabilidades y Desarrollo Seguro
  # =============================================================================
  security:
    name: '🔒 Security Scan'
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r SafeBridge/requirements.txt

      # ─── Semgrep: Análisis SAST (Static Application Security Testing) ───
      - name: Ejecutar Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
            p/sql-injection
          generateSarif: '1'
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Subir resultados Semgrep a GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      # ─── Snyk: Escaneo de dependencias vulnerables ───────────────────────
      - name: Ejecutar Snyk (vulnerabilidades en dependencias)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --file=SafeBridge/requirements.txt
            --severity-threshold=high
            --policy-path=.snyk

      # ─── Bandit: Análisis de seguridad específico para Python ────────────
      - name: Instalar y ejecutar Bandit
        run: |
          pip install bandit[toml]
          bandit -r SafeBridge/ \
            -x SafeBridge/__pycache__,SafeBridge/tests \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            || true

      - name: Subir reporte Bandit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

      # ─── pip-audit: Auditoría de paquetes con CVEs conocidos ─────────────
      - name: Ejecutar pip-audit (CVE en dependencias)
        run: |
          pip install pip-audit
          pip-audit -r SafeBridge/requirements.txt \
            --format=json \
            --output=pip-audit-report.json \
            || true

      - name: Subir reporte pip-audit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 30

  # =============================================================================
  # JOB 4: BUILD — Construcción del Artefacto (Ejecutable + Docker)
  # Ejecuta solo en push a main/develop o en tags de release
  # =============================================================================
  build:
    name: '📦 Build Artifacts'
    runs-on: windows-latest
    needs: [test, security]
    if: github.event_name == 'push'

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Instalar dependencias y PyInstaller
        run: |
          pip install --upgrade pip
          pip install -r SafeBridge/requirements.txt
          pip install pyinstaller

      - name: Construir ejecutable standalone con PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name ${{ env.APP_NAME }} `
            --distpath dist/ `
            --workpath build/ `
            --specpath . `
            SafeBridge/main.py

      - name: Verificar que el ejecutable fue generado
        run: |
          if (Test-Path "dist/${{ env.APP_NAME }}.exe") {
            Write-Host "✅ Ejecutable generado correctamente"
            Get-Item "dist/${{ env.APP_NAME }}.exe" | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "❌ ERROR: El ejecutable no fue generado"
            exit 1
          }

      - name: Subir ejecutable como artefacto del workflow
        uses: actions/upload-artifact@v4
        with:
          name: SafeBridge-Windows-exe
          path: dist/${{ env.APP_NAME }}.exe
          retention-days: 30

  # ─── Build Docker Image (Ubuntu) ─────────────────────────────────────────
  build-docker:
    name: '🐳 Build Docker Image'
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Login a Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: ./SafeBridge
          file: ./SafeBridge/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # =============================================================================
  # JOB 5: RELEASE — Publicación Automática en GitHub Releases
  # Ejecuta solo cuando se crea un tag de versión (v*.*.*)
  # =============================================================================
  release:
    name: '🚀 GitHub Release'
    runs-on: ubuntu-latest
    needs: [build, build-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar ejecutable Windows
        uses: actions/download-artifact@v4
        with:
          name: SafeBridge-Windows-exe
          path: release-assets/

      - name: Extraer versión del tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generar changelog automático
        id: changelog
        run: |
          # Obtener commits desde el último tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Crear GitHub Release con artefactos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "SafeBridge ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🛡️ SafeBridge ${{ steps.version.outputs.VERSION }}

            **Orquestador Multi-Motor de Respaldos y Validación de Integridad**

            *BitCraft Solutions — Universidad Privada de Tacna, FAING-EPIS*

            ---

            ### 📋 Cambios en esta versión

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### 📦 Artefactos disponibles

            | Artefacto | Plataforma | Descripción |
            |-----------|-----------|-------------|
            | `SafeBridge.exe` | Windows 10/11 x64 | Ejecutable standalone (incluye Python) |
            | Docker Image | Linux amd64/arm64 | `docker pull bitcraftsolutions/safebridge:${{ steps.version.outputs.VERSION }}` |

            ### 🔧 Requisitos adicionales (no incluidos en el ejecutable)
            - ODBC Driver 18 for SQL Server (si usas SQL Server)
            - MySQL 8.0+ client tools (si usas MySQL)
            - PostgreSQL 14+ client tools (si usas PostgreSQL)
            - Oracle Instant Client 21.x (si usas Oracle)

            ### 🐳 Uso con Docker
            ```bash
            docker pull bitcraftsolutions/safebridge:${{ steps.version.outputs.VERSION }}
            docker run -it \
              -v /ruta/local/backups:/app/backups \
              -e SAFEBRIDGE_LOG_LEVEL=INFO \
              bitcraftsolutions/safebridge:${{ steps.version.outputs.VERSION }}
            ```

            ### ☁️ Despliegue en AWS
            ```bash
            # Usar el artefacto .exe junto con la infraestructura Terraform incluida
            cd terraform/
            terraform init
            terraform apply -var="region=us-east-1"
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-rc') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-alpha') }}
          files: |
            release-assets/SafeBridge.exe
          token: ${{ secrets.GITHUB_TOKEN }}
